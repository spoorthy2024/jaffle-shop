sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: A clone of a Postgres application database
    tables:
      - name: customers
        description: Raw Customer data.
        columns:
          - name: id
            description: Primary Key for customer data
            data_tests:
            - unique
            - not_null
      - name: orders
        description: Raw Orders data.
        columns:
          - name: id
            description: Primary Key for orders data
            data_tests:
            - unique
            - not_null
            
        config: 
          freshness:
            warn_after:
              count: 1
              period: day
            error_after:
              count: 2
              period: day
          loaded_at_field: _etl_loaded_at