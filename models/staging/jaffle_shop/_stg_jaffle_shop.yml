models:
  - name: stg_jaffle_shop__customers
    description: The grain of this table is one unique customer per row.
    columns:
      - name: customer_id
        description: Primary key for the customers table
        data_tests:
          - unique
          - not_null       
  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: Primary key for the Orders table
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{doc('order_status')}}"
        data_tests:
        - accepted_values:
              arguments: 
                values: ['placed', 'shipped', 'completed', 'returned','return_pending']
      - name: customer_id
        description: The foriegn key used to reference customers from customers table
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name : order_date
        description: The date when customer placed the order.

          
